<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PêcheConnect — Connexion</title>
  <style>
    body{font-family:Arial, sans-serif; max-width:420px; margin:60px auto; padding:0 16px}
    .card{border:1px solid #ddd; border-radius:12px; padding:16px}
    label{display:block; margin-top:12px}
    input{width:100%; padding:10px; margin-top:6px}
    button{margin-top:16px; width:100%; padding:10px; cursor:pointer}
    .err{color:#b00020; margin-top:10px; white-space:pre-wrap}
    .hint{color:#555; font-size:13px; margin-top:8px}
  </style>
</head>
<body>
  <h2>PêcheConnect</h2>

  <div class="card">
    <label>Email</label>
    <input id="email" type="email" value="admin@peche.local" />

    <label>Mot de passe</label>
    <input id="password" type="password" value="admin123" />

    <button id="btn">Se connecter</button>
    <div class="hint">API attendue : http://localhost:3000</div>
    <div id="err" class="err"></div>
  </div>

  <script>
    const API = "http://localhost:3000";

    document.getElementById("btn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      document.getElementById("err").textContent = "";

      try {
        const r = await fetch(API + "/auth/login", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({email, password})
        });

        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          throw new Error(data.error || ("Erreur login (" + r.status + ")"));
        }

        localStorage.setItem("pc_token", data.token);
        localStorage.setItem("pc_user", JSON.stringify(data.user));
        window.location.href = "./app.html";
      } catch (e) {
        document.getElementById("err").textContent = String(e.message || e);
      }
    });
  </script>
</body>
</html>
